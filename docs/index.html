<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Holon HUB v1.5.5 multilingual overview built from hub-*.lua and orion.lua.">
    <meta name="theme-color" content="#08111c">
    <title>Holon HUB | Multilingual Build Overview</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="site-shell">
        <div class="bg-orb orb-one" aria-hidden="true"></div>
        <div class="bg-orb orb-two" aria-hidden="true"></div>
        <div class="bg-grid" aria-hidden="true"></div>

        <header class="site-header">
            <a class="brand" href="#top" aria-label="Holon HUB home">
                <span class="brand-meta">Prometheus / FTAP</span>
                <span class="brand-line">
                    <span class="brand-name">Holon HUB</span>
                    <span class="brand-version" id="brand-version"></span>
                </span>
            </a>

            <nav class="main-nav" aria-label="Primary" role="tablist">
                <button type="button" role="tab" aria-controls="portal" data-nav="portal"></button>
                <button type="button" role="tab" aria-controls="overview" data-nav="overview"></button>
                <button type="button" role="tab" aria-controls="guide" data-nav="guide"></button>
                <button type="button" role="tab" aria-controls="tutorials" data-nav="tutorials"></button>
                <button type="button" role="tab" aria-controls="piano-guide" data-nav="pianoGuide"></button>
                <button type="button" role="tab" aria-controls="access" data-nav="access"></button>
                <button type="button" role="tab" aria-controls="systems" data-nav="systems"></button>
                <button type="button" role="tab" aria-controls="interface" data-nav="interface"></button>
                <button type="button" role="tab" aria-controls="languages" data-nav="languages"></button>
            </nav>

            <label class="locale-control" for="locale-select">
                <span class="locale-label" id="locale-label"></span>
                <select id="locale-select" aria-label="Language"></select>
            </label>
        </header>

        <main id="top">
            <section class="hero reveal">
                <div class="hero-copy">
                    <p class="eyebrow" id="hero-eyebrow"></p>
                    <h1 class="hero-title">
                        <span class="hero-title-main">Holon HUB</span>
                        <span class="hero-title-sub" id="hero-subtitle"></span>
                    </h1>
                    <p class="hero-lead" id="hero-lead"></p>

                    <div class="cta-row">
                        <a class="button button-primary" id="cta-discord" target="_blank" rel="noreferrer"></a>
                        <a class="button button-secondary" id="cta-tiktok" target="_blank" rel="noreferrer"></a>
                        <a class="button button-secondary" id="cta-youtube" target="_blank" rel="noreferrer"></a>
                    </div>

                    <div class="stats-grid" id="stats-grid"></div>
                </div>

                <aside class="hero-panel glass-card">
                    <div class="panel-top">
                        <p class="panel-kicker" id="snapshot-kicker"></p>
                        <h2 class="panel-title" id="snapshot-title"></h2>
                    </div>
                    <p class="panel-body" id="snapshot-body"></p>
                    <dl class="snapshot-list" id="snapshot-list"></dl>
                    <div class="pill-row" id="source-pills"></div>
                </aside>
            </section>

            <section id="portal" class="section reveal" role="tabpanel">
                <div class="portal-grid" id="portal-grid"></div>
            </section>

            <section id="overview" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="overview-kicker"></p>
                    <h2 class="section-title" id="overview-title"></h2>
                </div>

                <div class="overview-layout">
                    <article class="glass-card narrative-card">
                        <p id="overview-body"></p>
                    </article>

                    <aside class="glass-card detail-card">
                        <dl class="detail-list" id="detail-list"></dl>
                    </aside>
                </div>
            </section>

            <section id="guide" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="guide-kicker"></p>
                    <h2 class="section-title" id="guide-title"></h2>
                    <p class="section-body" id="guide-body"></p>
                </div>

                <div class="guide-grid">
                    <article class="glass-card">
                        <h3 class="system-title" id="guide-about-title"></h3>
                        <p class="system-body" id="guide-about-body"></p>
                    </article>

                    <article class="glass-card">
                        <h3 class="system-title" id="guide-steps-title"></h3>
                        <div class="stack-list" id="guide-steps-list"></div>
                    </article>

                    <article class="glass-card">
                        <h3 class="system-title" id="guide-rules-title"></h3>
                        <div class="stack-list" id="guide-rules-list"></div>
                    </article>
                </div>
            </section>

            <section id="tutorials" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="tutorials-kicker"></p>
                    <h2 class="section-title" id="tutorials-title"></h2>
                    <p class="section-body" id="tutorials-body"></p>
                </div>

                <div class="tutorial-grid" id="tutorial-grid"></div>
            </section>

            <section id="piano-guide" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="piano-guide-kicker"></p>
                    <h2 class="section-title" id="piano-guide-title"></h2>
                    <p class="section-body" id="piano-guide-subtitle"></p>
                </div>

                <div class="piano-guide-shell glass-card">
                    <div class="piano-guide-meta">
                        <span class="interface-badge" id="piano-guide-updated"></span>
                    </div>
                    <p class="system-body piano-guide-intro" id="piano-guide-intro"></p>
                    <div class="piano-guide-grid" id="piano-guide-grid"></div>
                </div>
                <div id="converter" class="subsection converter-embed">
                    <div class="section-head">
                    <p class="section-kicker" id="converter-kicker"></p>
                    <h2 class="section-title" id="converter-title"></h2>
                    <p class="section-body" id="converter-body"></p>
                    </div>

                    <div class="converter-layout">
                        <article class="glass-card converter-card">
                            <div class="converter-form-grid">
                                <label class="field">
                                    <span class="field-label" id="converter-file-label"></span>
                                    <input id="midi-file" type="file" accept=".mid,.midi,audio/midi,audio/x-midi">
                                </label>

                                <label class="field">
                                    <span class="field-label" id="converter-interval-label"></span>
                                    <input id="min-interval" type="number" min="0" max="5" step="0.01" value="0.05">
                                </label>

                                <label class="field">
                                    <span class="field-label" id="converter-mode-label"></span>
                                    <select id="chord-mode">
                                        <option value="highest">highest</option>
                                        <option value="lowest">lowest</option>
                                    </select>
                                </label>
                            </div>

                            <div class="cta-row converter-actions">
                                <button class="button button-primary" id="convert-midi" type="button"></button>
                                <button class="button button-secondary" id="download-json" type="button" disabled></button>
                            </div>

                            <p class="converter-hint" id="converter-hint"></p>
                        </article>

                        <aside class="glass-card converter-card">
                            <dl class="snapshot-list" id="converter-stats"></dl>
                            <pre class="converter-output" id="converter-output"></pre>
                        </aside>
                    </div>
                </div>
            </section>

            <section id="access" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="access-kicker"></p>
                    <h2 class="section-title" id="access-title"></h2>
                    <p class="section-body" id="access-body"></p>
                </div>

                <div class="access-grid">
                    <article class="glass-card access-card">
                        <div class="access-head">
                            <h3 class="system-title" id="script-title"></h3>
                            <span class="interface-badge" id="script-badge"></span>
                        </div>
                        <p class="system-body" id="script-body"></p>
                        <pre class="snippet-box" id="script-code"></pre>
                    </article>

                    <article class="glass-card access-card">
                        <div class="access-head">
                            <h3 class="system-title" id="key-title"></h3>
                            <span class="interface-badge" id="key-badge"></span>
                        </div>
                        <p class="system-body" id="key-body"></p>
                        <div class="stack-list" id="key-list"></div>
                        <pre class="snippet-box" id="key-code"></pre>
                    </article>
                </div>
            </section>

            <section id="systems" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="systems-kicker"></p>
                    <h2 class="section-title" id="systems-title"></h2>
                    <p class="section-body" id="systems-body"></p>
                </div>

                <div class="systems-grid" id="systems-grid"></div>
            </section>

            <section id="interface" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="interface-kicker"></p>
                    <h2 class="section-title" id="interface-title"></h2>
                    <p class="section-body" id="interface-body"></p>
                </div>

                <div class="interface-shell glass-card">
                    <div class="interface-meta">
                        <span class="interface-badge" id="interface-badge"></span>
                        <span class="interface-source" id="interface-source"></span>
                    </div>
                    <div class="tab-grid" id="tab-grid"></div>
                </div>
            </section>

            <section id="languages" class="section reveal" role="tabpanel">
                <div class="section-head">
                    <p class="section-kicker" id="languages-kicker"></p>
                    <h2 class="section-title" id="languages-title"></h2>
                    <p class="section-body" id="languages-body"></p>
                </div>

                <div class="locale-grid" id="locale-grid"></div>
            </section>
        </main>

        <footer class="site-footer">
            <p id="footer-copy"></p>
        </footer>
    </div>

    <script src="content.js"></script>
    <script src="piano-guide-content.js"></script>
    <script src="app.js"></script>
</body>
</html>
