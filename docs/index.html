<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Holon HUB v1.5.5 multilingual overview built from hub-*.lua and orion.lua.">
    <meta name="theme-color" content="#08111c">
    <title>Holon HUB | Multilingual Build Overview</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="site-shell">
        <div class="bg-orb orb-one" aria-hidden="true"></div>
        <div class="bg-orb orb-two" aria-hidden="true"></div>
        <div class="bg-grid" aria-hidden="true"></div>

        <header class="site-header">
            <a class="brand" href="#top" aria-label="Holon HUB home">
                <span class="brand-meta">Prometheus / FTAP</span>
                <span class="brand-line">
                    <span class="brand-name">Holon HUB</span>
                    <span class="brand-version" id="brand-version"></span>
                </span>
            </a>

            <nav class="main-nav" aria-label="Primary">
                <a href="#overview" data-nav="overview"></a>
                <a href="#systems" data-nav="systems"></a>
                <a href="#interface" data-nav="interface"></a>
                <a href="#languages" data-nav="languages"></a>
            </nav>

            <label class="locale-control" for="locale-select">
                <span class="locale-label" id="locale-label"></span>
                <select id="locale-select" aria-label="Language"></select>
            </label>
        </header>

        <main id="top">
            <section class="hero reveal">
                <div class="hero-copy">
                    <p class="eyebrow" id="hero-eyebrow"></p>
                    <h1 class="hero-title">
                        <span class="hero-title-main">Holon HUB</span>
                        <span class="hero-title-sub" id="hero-subtitle"></span>
                    </h1>
                    <p class="hero-lead" id="hero-lead"></p>

                    <div class="cta-row">
                        <a class="button button-primary" id="cta-discord" target="_blank" rel="noreferrer"></a>
                        <a class="button button-secondary" id="cta-tiktok" target="_blank" rel="noreferrer"></a>
                        <a class="button button-secondary" id="cta-youtube" target="_blank" rel="noreferrer"></a>
                    </div>

                    <div class="stats-grid" id="stats-grid"></div>
                </div>

                <aside class="hero-panel glass-card">
                    <div class="panel-top">
                        <p class="panel-kicker" id="snapshot-kicker"></p>
                        <h2 class="panel-title" id="snapshot-title"></h2>
                    </div>
                    <p class="panel-body" id="snapshot-body"></p>
                    <dl class="snapshot-list" id="snapshot-list"></dl>
                    <div class="pill-row" id="source-pills"></div>
                </aside>
            </section>

            <section id="overview" class="section reveal">
                <div class="section-head">
                    <p class="section-kicker" id="overview-kicker"></p>
                    <h2 class="section-title" id="overview-title"></h2>
                </div>

                <div class="overview-layout">
                    <article class="glass-card narrative-card">
                        <p id="overview-body"></p>
                    </article>

                    <aside class="glass-card detail-card">
                        <dl class="detail-list" id="detail-list"></dl>
                    </aside>
                </div>
            </section>

            <section id="systems" class="section reveal">
                <div class="section-head">
                    <p class="section-kicker" id="systems-kicker"></p>
                    <h2 class="section-title" id="systems-title"></h2>
                    <p class="section-body" id="systems-body"></p>
                </div>

                <div class="systems-grid" id="systems-grid"></div>
            </section>

            <section id="interface" class="section reveal">
                <div class="section-head">
                    <p class="section-kicker" id="interface-kicker"></p>
                    <h2 class="section-title" id="interface-title"></h2>
                    <p class="section-body" id="interface-body"></p>
                </div>

                <div class="interface-shell glass-card">
                    <div class="interface-meta">
                        <span class="interface-badge" id="interface-badge"></span>
                        <span class="interface-source" id="interface-source"></span>
                    </div>
                    <div class="tab-grid" id="tab-grid"></div>
                </div>
            </section>

            <section id="languages" class="section reveal">
                <div class="section-head">
                    <p class="section-kicker" id="languages-kicker"></p>
                    <h2 class="section-title" id="languages-title"></h2>
                    <p class="section-body" id="languages-body"></p>
                </div>

                <div class="locale-grid" id="locale-grid"></div>
            </section>
        </main>

        <footer class="site-footer">
            <p id="footer-copy"></p>
        </footer>
    </div>

    <script src="content.js"></script>
    <script src="app.js"></script>
</body>
</html>
